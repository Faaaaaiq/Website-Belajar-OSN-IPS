<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="osn_ips_faaiq" content="width=device-width, initial-scale=1.0">
    <title>OSN IPS - SMP Muh Al Mujahidin-By: Faaiq</title>
    <style>
        body { 
            font-family: sans-serif; 
            background-color: #F2F2F7; 
            color: #1A1A1A; 
            margin: 0; padding: 20px 25px 150px 25px;
        }
        
        /* Header & Menu Atas */
        .header { margin-top: 40px; margin-bottom: 20px; }
        .header .osn-tag { font-size: 42px; font-weight: 900; margin: 0; letter-spacing: -2px; line-height: 0.8; }
        .header .sekolah-tag { color: #8E8E93; font-size: 10px; font-weight: bold; letter-spacing: 1.5px; text-transform: uppercase; margin-top: 8px; display: block; }

        /* Menu Kategori di Atas */
        .menu-atas { 
            display: flex; gap: 10px; margin-bottom: 30px; 
            overflow-x: auto; padding-bottom: 5px; scrollbar-width: none;
        }
        .menu-atas::-webkit-scrollbar { display: none; }
        .btn-kat { 
            background: #E5E5EA; border: none; padding: 10px 18px; 
            border-radius: 12px; font-size: 12px; font-weight: 800; 
            color: #8E8E93; cursor: pointer; white-space: nowrap;
        }
        .btn-kat.active { background: #000; color: #FFF; }

        /* Kontainer Halaman */
        .page { display: none; }
        .page.active { display: block; }

        .card { 
            background: #FFFFFF; border-radius: 20px; padding: 0; 
            margin-bottom: 15px; display: flex; align-items: stretch;
            box-shadow: 0 2px 5px rgba(0,0,0,0.04); overflow: hidden;
        }
        .materi-area { padding: 25px; flex: 1; cursor: pointer; }
        .materi-area:active { background-color: #F9F9F9; }
        .materi-nama { font-size: 20px; font-weight: 800; color: #1A1A1A; display: block; }

        .btn-del-box {
            display: flex; align-items: center; justify-content: center;
            padding: 0 20px; background: #FFF; border-left: 1px solid #F2F2F7;
            cursor: pointer; color: #D1D1D6; font-size: 18px; font-weight: bold;
        }

        .btn-plus { 
            position: fixed; bottom: 110px; right: 25px; 
            width: 65px; height: 65px; background: #000; color: #FFF; 
            border-radius: 22px; font-size: 35px; border: none; z-index: 100;
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
        }

        /* Navigasi Bawah Kembali ke Awal */
        .nav-bawah { 
            position: fixed; bottom: 0; left: 0; right: 0; 
            background: rgba(255,255,255,0.96); height: 85px;
            display: flex; justify-content: space-around; align-items: center;
            border-top: 1px solid #E5E5EA; z-index: 90; backdrop-filter: blur(10px);
        }
        .btn-nav { background: none; border: none; font-weight: 800; font-size: 11px; color: #000; }
        .btn-lens { border: 2.5px solid #000; border-radius: 25px; padding: 10px 20px; }
    </style>
</head>
<body>

    <div class="header">
        <div class="osn-tag">OSN IPS<span style="color:#8E8E93">.</span></div>
        <span class="sekolah-tag">SMP Muhammadiyah Al Mujahidin</span>
    </div>

    <div class="menu-atas">
        <button class="btn-kat active" onclick="bukaHalaman(1)">GEOGRAFI</button>
        <button class="btn-kat" onclick="bukaHalaman(2)">SEJARAH</button>
        <button class="btn-kat" onclick="bukaHalaman(3)">EKONOMI</button>
        <button class="btn-kat" onclick="bukaHalaman(4)">SOSIOLOGI</button>
    </div>

    <div id="p1" class="page active"><div id="list-1"></div></div>
    <div id="p2" class="page"><div id="list-2"></div></div>
    <div id="p3" class="page"><div id="list-3"></div></div>
    <div id="p4" class="page"><div id="list-4"></div></div>

    <button class="btn-plus" onclick="tambahItem()">+</button>

    <div class="nav-bawah">
        <button class="btn-nav" onclick="window.scrollTo({top:0, behavior:'smooth'})">HOME</button>
        <button class="btn-nav btn-lens" onclick="window.open('https://www.google.com/searchbyimage/upload')">LENS</button>
        <button class="btn-nav" style="color:#D1D1D6" onclick="resetSemua()">RESET</button>
    </div>

    <script>
        var DB = "OSN_FINAL_V10";
        var halAktif = 1;

        function bukaHalaman(n) {
            halAktif = n;
            var buttons = document.querySelectorAll('.btn-kat');
            var pages = document.querySelectorAll('.page');
            
            buttons.forEach((btn, index) => {
                btn.classList.toggle('active', index === (n-1));
            });
            pages.forEach((page, index) => {
                page.classList.toggle('active', index === (n-1));
            });
        }

        function tambahItem() {
            var nama = prompt("Nama Materi:");
            if (!nama || nama.trim() === "") return;
            var data = JSON.parse(localStorage.getItem(DB) || "[]");
            data.push({ id: Date.now(), nama: nama.trim(), kat: halAktif });
            localStorage.setItem(DB, JSON.stringify(data));
            muatData();
        }

        function hapusItem(id, nama) {
            if(confirm("Hapus '" + nama + "'?")) {
                var data = JSON.parse(localStorage.getItem(DB) || "[]");
                var baru = data.filter(function(i) { return i.id !== id });
                localStorage.setItem(DB, JSON.stringify(baru));
                muatData();
            }
        }

        function salin(nama) {
            var txt = "Halo Gemini, aku adalah calon peserta OSN IPS SMP. Jadi tolong jelaskan secara mendalam disertai ringkasan materi OSN IPS tentang: " + nama;
            var el = document.createElement("textarea");
            el.value = txt; document.body.appendChild(el);
            el.select(); document.execCommand("copy");
            document.body.removeChild(el);
            alert("Mencari materi: " + nama + "\nSilakan tempel di Gemini.");
            window.open("https://gemini.google.com/app");
        }

        function muatData() {
            for(var i=1; i<=4; i++) { document.getElementById('list-' + i).innerHTML = ""; }
            var data = JSON.parse(localStorage.getItem(DB) || "[]");
            data.forEach(function(item) {
                var box = document.getElementById('list-' + item.kat);
                if(box) {
                    var card = document.createElement('div');
                    card.className = "card";
                    card.innerHTML = 
                        '<div class="materi-area" onclick="salin(\'' + item.nama + '\')">' +
                            '<span class="materi-nama">' + item.nama + '</span>' +
                        '</div>' +
                        '<div class="btn-del-box" onclick="hapusItem(' + item.id + ', \'' + item.nama + '\')">✕</div>';
                    box.appendChild(card);
                }
            });
        }

        function resetSemua() {
            if(confirm("Hapus seluruh data?")) { localStorage.removeItem(DB); muatData(); }
        }

        window.onload = muatData;
    </script>
</body>
</html>
